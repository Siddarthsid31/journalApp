<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Journify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #4f8ef7;
      --accent2: #a78bfa;
      --bg: #050a18;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --text: #f0f4ff;
      --muted: rgba(200,210,240,0.55);
    }

    body { min-height: 100vh; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(5,10,24,0.8);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-dot { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #4f8ef7, #a78bfa); display: flex; align-items: center; justify-content: center; }
    .logo-dot svg { width: 15px; height: 15px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .logo-name { font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); }

    .topbar-right { display: flex; align-items: center; gap: 1rem; }

    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #4f8ef7, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-size: 0.85rem; font-weight: 600; color: white;
      cursor: pointer;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    .main { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s ease both;
    }

    .page-header h1 { font-family: 'Sora', sans-serif; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    .page-header p { color: var(--muted); font-size: 0.88rem; margin-top: 0.25rem; }

    .new-btn {
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #4f8ef7, #a78bfa);
      color: white;
      border: none;
      padding: 0.65rem 1.3rem;
      border-radius: 12px;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      text-decoration: none;
    }
    .new-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .new-btn svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem 1.4rem;
    }

    .stat-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.8px; }
    .stat-value { font-family: 'Sora', sans-serif; font-size: 1.8rem; font-weight: 700; }
    .stat-value.blue { color: #4f8ef7; }
    .stat-value.purple { color: #a78bfa; }
    .stat-value.green { color: #34d399; }

    .entries-header {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 1rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .entries-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .entry-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.3rem 1.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .entry-card:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); transform: translateY(-2px); }

    .entry-left { flex: 1; min-width: 0; }
    .entry-title { font-family: 'Sora', sans-serif; font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-preview { font-size: 0.85rem; color: var(--muted); line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; flex-shrink: 0; }
    .entry-date { font-size: 0.75rem; color: var(--muted); }

    .sentiment-badge {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sentiment-badge.HAPPY { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.25); }
    .sentiment-badge.SAD { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }
    .sentiment-badge.ANGRY { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
    .sentiment-badge.ANXIOUS { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
    .sentiment-badge.NEUTRAL { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid rgba(148,163,184,0.25); }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty-state svg { width: 48px; height: 48px; stroke: var(--muted); fill: none; stroke-width: 1.5; margin-bottom: 1rem; stroke-linecap: round; stroke-linejoin: round; }
    .empty-state h3 { font-family: 'Sora', sans-serif; font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.88rem; }

    .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }
    .loading span { display: inline-block; animation: pulse 1.2s ease infinite; }

    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .entry-actions { display: flex; gap: 0.5rem; }
    .action-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
    }
    .action-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .action-btn.delete:hover { border-color: rgba(248,113,113,0.4); color: #f87171; }
    .action-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>

<nav class="topbar">
  <a class="logo" href="index.html">
    <div class="logo-dot">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="logo-name">Journify</span>
  </a>
  <div class="topbar-right">
    <div class="avatar" id="avatarEl">?</div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</nav>

<main class="main">
  <div class="page-header">
    <div>
      <h1>My Journal</h1>
      <p id="greetingText">Loading your entries...</p>
    </div>
    <a class="new-btn" href="create.html">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Entry
    </a>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Entries</div>
      <div class="stat-value blue" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This Month</div>
      <div class="stat-value purple" id="statMonth">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Top Mood</div>
      <div class="stat-value green" id="statMood">—</div>
    </div>
  </div>

  <div class="entries-header">Recent Entries</div>

  <div class="entries-list" id="entriesList">
    <div class="loading"><span>Loading entries...</span></div>
  </div>
</main>

<script>
    const API = window.location.hostname === 'localhost'
    ? 'http://localhost:8081'
    : 'https://journalapp-2pia.onrender.com';
    const token = localStorage.getItem('jwt');

    if (!token) {
      window.location.href = 'index.html';
    }

    const email = localStorage.getItem('userEmail') || '';
    const initials = email ? email.substring(0, 2).toUpperCase() : 'ME';
    document.getElementById('avatarEl').textContent = initials;

    const hour = new Date().getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greetingText').textContent = `${greet}! Here are your journal entries.`;

    async function loadEntries() {
      try {
        const res = await fetch(`${API}/journal`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) { logout(); return; }
        const entries = await res.json();
        renderEntries(entries);
        renderStats(entries);
      } catch(e) {
        document.getElementById('entriesList').innerHTML = `<div class="empty-state"><p>Could not load entries. Is the server running?</p></div>`;
      }
    }

    function renderStats(entries) {
      document.getElementById('statTotal').textContent = entries.length;
      const thisMonth = entries.filter(e => {
        const d = new Date(e.date);
        const now = new Date();
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      }).length;
      document.getElementById('statMonth').textContent = thisMonth;
      const moods = {};
      entries.forEach(e => { if(e.sentiment) moods[e.sentiment] = (moods[e.sentiment]||0)+1; });
      const topMood = Object.entries(moods).sort((a,b)=>b[1]-a[1])[0];
      document.getElementById('statMood').textContent = topMood ? topMood[0] : '—';
    }

    function renderEntries(entries) {
      const list = document.getElementById('entriesList');
      if (!entries.length) {
        list.innerHTML = `<div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <h3>No entries yet</h3>
          <p>Start writing — your first entry is just a click away.</p>
        </div>`;
        return;
      }
      list.innerHTML = entries.map(e => `
        <div class="entry-card">
          <div class="entry-left">
            <div class="entry-title">${escHtml(e.title || 'Untitled')}</div>
            <div class="entry-preview">${escHtml((e.content || '').substring(0,100))}${(e.content||'').length > 100 ? '...' : ''}</div>
          </div>
          <div class="entry-right">
            <div class="entry-date">${formatDate(e.date)}</div>
            ${e.sentiment ? `<span class="sentiment-badge ${e.sentiment}">${e.sentiment}</span>` : ''}
            <div class="entry-actions">
              <button class="action-btn" onclick="editEntry('${e.id?.timestamp||''}')">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="action-btn delete" onclick="deleteEntry(event, '${e.id?.timestamp||''}')">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function formatDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function editEntry(id) {
      window.location.href = `create.html?id=${id}`;
    }

    async function deleteEntry(evt, id) {
      evt.stopPropagation();
      if (!confirm('Delete this entry?')) return;
      try {
        await fetch(`${API}/journal/id/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        loadEntries();
      } catch(e) { alert('Could not delete entry.'); }
    }

    function logout() {
      localStorage.removeItem('jwt');
      localStorage.removeItem('userEmail');
      window.location.href = 'index.html';
    }

    loadEntries();
</script>
</body>
</html>
