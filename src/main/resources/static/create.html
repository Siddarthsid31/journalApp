<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Entry — Journify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #4f8ef7;
      --accent2: #a78bfa;
      --bg: #050a18;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --text: #f0f4ff;
      --muted: rgba(200,210,240,0.55);
    }

    body { min-height: 100vh; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(5,10,24,0.8);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-dot { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #4f8ef7, #a78bfa); display: flex; align-items: center; justify-content: center; }
    .logo-dot svg { width: 15px; height: 15px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .logo-name { font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); }

    .topbar-actions { display: flex; gap: 0.8rem; align-items: center; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.5rem 1.1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .btn-ghost svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .btn-primary {
      background: linear-gradient(135deg, #4f8ef7, #a78bfa);
      color: white;
      border: none;
      padding: 0.5rem 1.3rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s, transform 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    .main { max-width: 750px; margin: 0 auto; padding: 2.5rem 1.5rem; animation: fadeUp 0.6s ease both; }

    .date-line { color: var(--muted); font-size: 0.82rem; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.8px; }

    .title-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
      margin-bottom: 1.5rem;
      resize: none;
      line-height: 1.2;
    }

    .title-input::placeholder { color: rgba(200,210,240,0.2); }

    .divider-line { width: 100%; height: 1px; background: var(--border); margin-bottom: 1.5rem; }

    .content-area {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      color: var(--text);
      line-height: 1.85;
      resize: none;
      min-height: 400px;
    }

    .content-area::placeholder { color: rgba(200,210,240,0.2); }

    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 1rem 2.5rem;
      background: rgba(5,10,24,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .word-count { font-size: 0.8rem; color: var(--muted); }

    .mood-selector { display: flex; align-items: center; gap: 0.6rem; }
    .mood-label { font-size: 0.78rem; color: var(--muted); }
    .mood-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .mood-btn:hover, .mood-btn.active { background: rgba(79,142,247,0.15); border-color: rgba(79,142,247,0.4); color: #4f8ef7; }

    .toast {
      position: fixed;
      top: 80px; right: 1.5rem;
      background: rgba(52,211,153,0.15);
      border: 1px solid rgba(52,211,153,0.3);
      color: #34d399;
      padding: 0.7rem 1.2rem;
      border-radius: 12px;
      font-size: 0.85rem;
      display: none;
      animation: slideIn 0.3s ease;
      z-index: 200;
    }
    .toast.error { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.3); color: #f87171; }

    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<nav class="topbar">
  <a class="logo" href="dashboard.html">
    <div class="logo-dot">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="logo-name">Journify</span>
  </a>
  <div class="topbar-actions">
    <a class="btn-ghost" href="dashboard.html">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back
    </a>
    <button class="btn-primary" id="saveBtn" onclick="saveEntry()">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Save Entry
    </button>
  </div>
</nav>

<div class="toast" id="toast"></div>

<main class="main">
  <div class="date-line" id="dateLine"></div>

  <textarea
    class="title-input"
    id="titleInput"
    placeholder="Give your entry a title..."
    rows="1"
    oninput="autoResize(this)"
  ></textarea>

  <div class="divider-line"></div>

  <textarea
    class="content-area"
    id="contentInput"
    placeholder="What's on your mind today? Write freely — this is your space..."
    oninput="updateWordCount()"
  ></textarea>
</main>

<div class="bottom-bar">
  <span class="word-count" id="wordCount">0 words</span>
  <div class="mood-selector">
    <span class="mood-label">Mood:</span>
    <button class="mood-btn" data-mood="HAPPY" onclick="selectMood(this)">Happy</button>
    <button class="mood-btn" data-mood="SAD" onclick="selectMood(this)">Sad</button>
    <button class="mood-btn" data-mood="ANXIOUS" onclick="selectMood(this)">Anxious</button>
    <button class="mood-btn" data-mood="ANGRY" onclick="selectMood(this)">Angry</button>
    <button class="mood-btn" data-mood="NEUTRAL" onclick="selectMood(this)">Neutral</button>
  </div>
</div>

<script>
  const API = 'http://localhost:8081';
  const token = localStorage.getItem('jwt');
  if (!token) window.location.href = 'index.html';

  let selectedMood = null;
  const params = new URLSearchParams(window.location.search);
  const editId = params.get('id');

  document.getElementById('dateLine').textContent = new Date().toLocaleDateString('en-IN', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function updateWordCount() {
    const text = document.getElementById('contentInput').value.trim();
    const count = text ? text.split(/\s+/).length : 0;
    document.getElementById('wordCount').textContent = `${count} word${count !== 1 ? 's' : ''}`;
  }

  function selectMood(btn) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedMood = btn.dataset.mood;
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }

  async function saveEntry() {
    const title = document.getElementById('titleInput').value.trim();
    const content = document.getElementById('contentInput').value.trim();
    if (!title) { showToast('Please add a title', true); return; }
    if (!content) { showToast('Please write something', true); return; }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const payload = { title, content, sentiment: selectedMood || 'NEUTRAL' };

    try {
      const method = editId ? 'PUT' : 'POST';
      const url = editId ? `${API}/journal/journal/id/${editId}` : `${API}/journal/journal`;
      const res = await fetch(url, {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        showToast('Entry saved successfully! ✓');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } else if (res.status === 401) {
        window.location.href = 'index.html';
      } else {
        showToast('Failed to save. Try again.', true);
        btn.disabled = false;
        btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Save Entry';
      }
    } catch(e) {
      showToast('Server not reachable.', true);
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Save Entry';
    }
  }

  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveEntry(); }
  });
</script>
</body>
</html>
